<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHaven - Channels</title>
    <link rel="stylesheet" href="server.css">
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <h2>Channels</h2>
            <input type="text" id="searchChannel" placeholder="Search for a channel...">
            <button id="createChannel">+ Create Channel</button>
            <div id="channelList"></div>
        </div>

        <div class="chat-box">
            <h2 id="chatChannelName">Select a channel to chat</h2>
            <div id="messages"></div>
            <div class="message-input">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendMessage">Send</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="../server/server.js" type="module"></script>

</body>
</html>
